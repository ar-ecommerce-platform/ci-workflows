# ------------------------------------------------------------------------------
# Workflow: Reusable CI Workflow
# Purpose:
#   Runs the full CI pipeline (build, test, scan, publish) for all services using one shared workflow.
#
# Trigger:
#   Invoked by services via "workflow_call".
#
# Notes:
#   - "publish" job only runs for commits/merges on main to prevent accidental releases.
#   - Jobs (code quality, security scan, tests) can be toggled via workflow inputs
#   - Jobs are dependency-aware and stop running later jobs if earlier ones fail (fail fast).
# ------------------------------------------------------------------------------
name: Reusable CI Workflow

on:
  workflow_call:
    inputs:
      enable_database:
        type: boolean
        default: true
      run_code_quality:
        type: boolean
        default: true
      run_unit_tests:
        type: boolean
        default: true
      run_integration_tests:
        type: boolean
        default: true
      run_quality_scan:
        type: boolean
        default: true
      run_security_scan:
        type: boolean
        default: true
    secrets:
      REPORTS_TRIGGER_TOKEN:
        required: true
      OWASP_API_KEY:
        required: true
      SONAR_TOKEN:
        required: false
      SNYK_TOKEN:
        required: false
jobs:
  # ---------------------------
  # 1. Sets up Gradle, builds the service artifact, and pushes a test Docker image.
  # ---------------------------
  setup:
    uses: ./.github/workflows/setup.yml
    with:
      service_name: ${{ github.event.repository.name }}
    permissions:
      contents: read
      packages: write

  # ---------------------------
  # 2. Runs Spotless Check and Checkstyle
  # ---------------------------
  code-quality:
    uses: ./.github/workflows/code-quality.yml
    needs: setup
    with:
      service_name: ${{ github.event.repository.name }}
      gradle_cache_key: ${{ needs.setup.outputs.gradle_cache_key }}
      run_code_quality: ${{ fromJSON(inputs.run_code_quality) }}
  # ---------------------------
  # 3. Runs OWASP Dependency Check and Snyk Container Scan
  # ---------------------------
  security-scan:
    uses: ./.github/workflows/security-scan.yml
    needs: setup
    with:
      service_name: ${{ github.event.repository.name }}
      gradle_cache_key: ${{ needs.setup.outputs.gradle_cache_key }}
      run_security_scan: ${{ fromJSON(inputs.run_security_scan) }}
    secrets:
      OWASP_API_KEY: ${{ secrets.OWASP_API_KEY }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # ---------------------------
  # 4. Runs Unit Tests
  # ---------------------------
  unit-tests:
    uses: ./.github/workflows/unit-tests.yml
    needs: setup
    with:
      service_name: ${{ github.event.repository.name }}
      gradle_cache_key: ${{ needs.setup.outputs.gradle_cache_key }}
      run_unit_tests: ${{ fromJSON(inputs.run_unit_tests) }}

  # ---------------------------
  # 5. Runs Integration Tests
  # ---------------------------
  integration-tests:
    uses: ./.github/workflows/integration-tests.yml
    needs: setup
    with:
      service_name: ${{ github.event.repository.name }}
      gradle_cache_key: ${{ needs.setup.outputs.gradle_cache_key }}
      enable_database: ${{ inputs.enable_database }}
      run_integration_tests: ${{ fromJSON(inputs.run_integration_tests) }}
