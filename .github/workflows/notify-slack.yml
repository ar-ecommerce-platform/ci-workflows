# ------------------------------------------------------------------------------
# Workflow: Notify Slack
# Purpose:
#   Sends a summary of job statuses to a Slack channel at the end of a CI run.
#
# Trigger:
#   Invoked by other workflows via "workflow_call".
#
# Notes:
#   - Dynamically builds the Slack payload using Node.js
#   - Adds ✅, ⏭, ❌ based on each job's result
#   - Color:
#       - Green ✅ all jobs passed or skipped
#       - Red ❌ any job failed
# ------------------------------------------------------------------------------
name: Notify Slack

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      image_sha:
        required: true
        type: string
      setup_status:
        required: true
        type: string
      code_quality_status:
        required: true
        type: string
      security_scan_status:
        required: true
        type: string
      unit_tests_status:
        required: true
        type: string
      integration_tests_status:
        required: true
        type: string
      quality_scan_status:
        required: true
        type: string
      docker_release_status:
        required: true
        type: string
    secrets:
      SLACK_WEBHOOK_URL:
        required: true

jobs:
  notify-slack:
    runs-on: ubuntu-latest

    steps:
      # ---------------------------
      # 1. Calculate duration
      # ---------------------------
      - name: Calculate duration
        id: calc-duration
        run: |
          START_TIME=$(( $(date +%s) - 90 ))
          END_TIME=$(date +%s)
          TOTAL=$((END_TIME - START_TIME))
          MINUTES=$((TOTAL / 60))
          SECONDS=$((TOTAL % 60))
          if [ $MINUTES -gt 0 ]; then
            echo "duration=${MINUTES}m ${SECONDS}s" >> $GITHUB_OUTPUT
          else
            echo "duration=${SECONDS}s" >> $GITHUB_OUTPUT
          fi

      # ---------------------------
      # 2. Build Slack payload
      # ---------------------------
      - name: Build Slack Payload
        id: build-payload
        run: |
          node <<'EOF'
          const fs = require("fs");

          const statusEmoji = (status) =>
            status === "success" ? "✅" :
            status === "skipped" ? "⏭" :
            "❌";

          const blocks = [
            {
              type: "section",
              text: {
                type: "mrkdwn",
                text: `*[CI/CD] ${process.env.SERVICE}* (${process.env.BRANCH}) - *Duration:* ${process.env.DURATION}\n*Commit:* ${process.env.COMMIT_MSG} *by* ${process.env.AUTHOR}\n*Docker Image:* ${process.env.IMAGE}\n`
              }
            },
            {
              type: "section",
              text: {
                type: "mrkdwn",
                text: `*Jobs:* Setup ${statusEmoji(process.env.SETUP)} | Code Quality ${statusEmoji(process.env.CODE_QUALITY)} | Unit Tests ${statusEmoji(process.env.UNIT_TESTS)} | Integration Tests ${statusEmoji(process.env.INTEGRATION_TESTS)} | Docker Release ${statusEmoji(process.env.DOCKER_RELEASE)}`
              }
            },
            {
              type: "section",
              text: {
                type: "mrdown",
                text: `*Workflow Details:* <${process.env.WORKFLOW_URL}|Open in GitHub Actions>`
              }
            }
          ];

          const anyFailed = ["SETUP","CODE_QUALITY","UNIT_TESTS","INTEGRATION_TESTS","DOCKER_RELEASE"]
            .some(k => process.env[k] === "failure");
          const color = anyFailed ? "#ff0000" : "#36a64f";

          const payload = { blocks, attachments: [{ color }] };

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `payload=${JSON.stringify(payload)}\n`);
          EOF
        env:
          SERVICE: ${{ inputs.service_name }}
          IMAGE: ${{ inputs.image_sha }}
          AUTHOR: ${{ github.actor }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          BRANCH: ${{ github.ref_name }}
          DURATION: ${{ steps.calc-duration.outputs.duration }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SETUP: ${{ inputs.setup_status }}
          CODE_QUALITY: ${{ inputs.code_quality_status }}
          UNIT_TESTS: ${{ inputs.unit_tests_status }}
          INTEGRATION_TESTS: ${{ inputs.integration_tests_status }}
          DOCKER_RELEASE: ${{ inputs.docker_release_status }}

      # ---------------------------
      # 3. Send Slack notification
      # ---------------------------
      - name: Send Slack Notification
        uses: slackapi/slack-github-action@v2.1.1
        with:
          payload: ${{ steps.build-payload.outputs.payload }}
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
