# ------------------------------------------------------------------------------
# Workflow: Notify Slack
# Purpose:
#   Sends a summary of job statuses to a Slack channel at the end of a CI run.
#
# Trigger:
#   Invoked by other workflows via "workflow_call".
#
# Notes:
#   - Dynamically builds the Slack payload using Node.js
#   - Adds ✅, ⏭, ❌ based on each job's result
#   - Color:
#       - Green ✅ all jobs passed or skipped
#       - Red ❌ any job failed
# ------------------------------------------------------------------------------
name: Notify Slack

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      image_sha:
        required: true
        type: string
      setup_status:
        required: true
        type: string
      code_quality_status:
        required: true
        type: string
      security_scan_status:
        required: true
        type: string
      unit_tests_status:
        required: true
        type: string
      integration_tests_status:
        required: true
        type: string
      quality_scan_status:
        required: true
        type: string
      docker_release_status:
        required: true
        type: string
    secrets:
      SLACK_WEBHOOK_URL:
        required: true

jobs:
  notify-slack:
    runs-on: ubuntu-latest

    steps:
      - name: Calculate duration
        id: calc-duration
        run: |
          START_TIME=$(( $(date +%s) - 90 ))
          END_TIME=$(date +%s)
          TOTAL=$((END_TIME - START_TIME))
          MINUTES=$((TOTAL / 60))
          SECONDS=$((TOTAL % 60))
          if [ $MINUTES -gt 0 ]; then
            echo "duration=${MINUTES}m ${SECONDS}s" >> $GITHUB_OUTPUT
          else
            echo "duration=${SECONDS}s" >> $GITHUB_OUTPUT
          fi

      # ---------------------------
      # 1. Build Slack Payload (Dynamic JSON)
      #    - Loops through job statuses and assigns ✅, ⏭, ❌
      #    - Determines color: green if no failures, red if any failed
      # ---------------------------
      - name: Build Slack Payload
        id: build-payload
        run: |
          node <<'EOF'
          const fs = require("fs");

          // Collect jobs and statuses
          const jobs = [
            ["Setup", process.env.SETUP],
            ["Code Quality", process.env.CODE_QUALITY],
            ["Security Scan", process.env.SECURITY_SCAN],
            ["Unit Tests", process.env.UNIT_TESTS],
            ["Integration Tests", process.env.INTEGRATION_TESTS],
            ["Quality Scan", process.env.QUALITY_SCAN],
            ["Docker Release", process.env.DOCKER_RELEASE],
          ];

          // Map each job status to an emoji
          const rows = jobs.map(([name, status]) => {
            const emoji =
              status === "success" ? "✅" :
              status === "skipped" ? "⏭" :
              "❌ *FAILED*";
            return `*${name}* | ${emoji}`;
          });

          // Determine color: red if any failed, green otherwise
          const anyFailed = jobs.some(([, s]) => s === "failed");
          const color = anyFailed ? "#ff0000" : "#36a64f";

          // Build Slack message payload
          const payload = {
          blocks: [
            {
              type: "header",
              text: {
                type: "plain_text",
                text: `CI/CD Summary for ${process.env.SERVICE}`,
                emoji: true
              }
            },
            {
              type: "section",
              text: { type: "mrkdwn", text: `*Project:*\n${process.env.SERVICE}` }
            },
            {
              type: "section",
              text: { type: "mrkdwn", text: `*Docker Image:*\n${process.env.IMAGE}` }
            },
            {
              type: "section",
              text: { type: "mrkdwn", text: `*Commit Author:*\n${process.env.AUTHOR}` }
            },
            {
              type: "section",
              text: { type: "mrkdwn", text: `*Commit:*\n${process.env.COMMIT_MSG}` }
            },
            {
              type: "section",
              text: { type: "mrkdwn", text: `*Branch:*\n${process.env.BRANCH}` }
            },
            {
              type: "section",
              text: { type: "mrkdwn", text: `*Duration:*\n${process.env.DURATION}` }
            },
            {
              type: "divider"
            },
            {
              type: "section",
              text: {
                type: "mrkdwn",
                text: `*Job | Status*\n${rows.join("\n")}`
              }
            }
          ]
          };

          const payloadString = JSON.stringify(payload).replace(/\n/g, '');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `payload=${payloadString}\n`);
          EOF
        env:
          SERVICE: ${{ inputs.service_name }}
          IMAGE: ${{ inputs.image_sha }}
          AUTHOR: ${{ github.actor }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          BRANCH: ${{ github.ref_name }}
          DURATION: ${{ steps.calc-duration.outputs.duration }}
          SETUP: ${{ inputs.setup_status }}
          CODE_QUALITY: ${{ inputs.code_quality_status }}
          SECURITY_SCAN: ${{ inputs.security_scan_status }}
          UNIT_TESTS: ${{ inputs.unit_tests_status }}
          INTEGRATION_TESTS: ${{ inputs.integration_tests_status }}
          QUALITY_SCAN: ${{ inputs.quality_scan_status }}
          DOCKER_RELEASE: ${{ inputs.docker_release_status }}

      # ---------------------------
      # 2. Send Slack Notification
      #    - Posts the JSON payload from step 1 to Slack
      # ---------------------------
      - name: Send Slack Notification
        uses: slackapi/slack-github-action@v2.1.1
        with:
          payload: ${{ steps.build-payload.outputs.payload }}
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
