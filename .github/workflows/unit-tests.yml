# ------------------------------------------------------------------------------
# Workflow: Unit Tests
# Purpose:
#   Runs Unit Tests
#
# Trigger:
#   Invoked by other workflows via "workflow_call".
#
# Notes:
#   - Unit testing: Verifies that each component or function works correctly on its own
# ------------------------------------------------------------------------------
name: Unit Tests

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      gradle_cache_key:
        required: false
        type: string
      run_unit_tests:
        type: boolean
        default: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ---------------------------
      # 1. Skip workflow if disabled
      # ---------------------------
      - name: Check if unit tests should run
        if: ${{ !inputs.run_unit_tests }}
        run: |
          echo "Unit tests are disabled for this service, exiting..."
          exit 0

      # ---------------------------
      # 2. Check out repository
      # ---------------------------
      - name: Checkout repository
        uses: actions/checkout@v5

      # ---------------------------
      # 3. Set up Java 21
      # ---------------------------
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "21"

      # ---------------------------
      # 4. Searches GitHub Actions cache storage for an entry matching gradle_cache_key
      #   - If found → restore into ~/.gradle/caches and ~/.gradle/wrapper
      #   - If not found → try restore-keys prefix for partial match
      #   - If still not found → Gradle downloads fresh, saved under key after job
      # ---------------------------
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ inputs.gradle_cache_key }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ---------------------------
      # 5. Run Unit Tests
      # ---------------------------
      - name: Run Unit Tests
        run: ./gradlew test --no-daemon

      # ---------------------------
      # 6. Upload report for feedback
      # ---------------------------
      - name: Upload Unit Tests Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-${{ inputs.service_name }}
          path: build/reports/tests/unit/${{ inputs.service_name }}

      # ---------------------------
      # 7. Upload Coverage Artifacts(Used for coverage badge)
      # ---------------------------
      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-exec-${{ inputs.service_name }}
          path: build/jacoco/${{ inputs.service_name }}/test.exec

      # ---------------------------
      # 7. Upload Coverage Artifacts(Used in quality-scan.yml for SonarCloud Analysis)
      # ---------------------------
      - name: Upload Coverage XML Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-${{ inputs.service_name }}
          path: build/reports/jacoco/${{ inputs.service_name }}/coverage.xml
